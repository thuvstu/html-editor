<!DOCTYPE html>
<html lang="ja">

<head>
    <meta charset="UTF-8">
    <title>Bookmark Editor</title>
    <style>
        /* ── Reset & Base ──────────────────────────────────────── */
        *,
        *::before,
        *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html,
        body {
            height: 100%;
            overflow: hidden;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background: #f0f4f8;
            color: #2d3748;
            display: flex;
            flex-direction: column;
            font-size: 14px;
        }

        /* ── Toolbar ────────────────────────────────────────────── */
        #toolbar {
            background: #1e3a5f;
            color: white;
            padding: 0 20px;
            height: 52px;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.2);
            z-index: 10;
        }

        #toolbar h1 {
            font-size: 17px;
            font-weight: 700;
            white-space: nowrap;
        }

        #toolbar .spacer {
            flex: 1;
        }

        #toolbar .stats {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.6);
            white-space: nowrap;
        }

        .tb-btn {
            padding: 7px 14px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            font-size: 13px;
            font-weight: 600;
            transition: 0.15s;
            white-space: nowrap;
        }

        .tb-btn:hover {
            opacity: 0.85;
            transform: translateY(-1px);
        }

        .tb-import {
            background: rgba(255, 255, 255, 0.18);
            color: white;
        }

        .tb-export {
            background: #0d9488;
            color: white;
        }

        .tb-export:disabled {
            background: rgba(255, 255, 255, 0.12);
            color: rgba(255, 255, 255, 0.4);
            cursor: not-allowed;
            transform: none;
        }

        #file-import-input {
            display: none;
        }

        /* ── Layout ─────────────────────────────────────────────── */
        #layout {
            flex: 1;
            display: flex;
            overflow: hidden;
        }

        /* ── Tree Panel ─────────────────────────────────────────── */
        #tree-panel {
            width: 280px;
            min-width: 200px;
            max-width: 420px;
            background: white;
            border-right: 1px solid #e2e8f0;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            flex-shrink: 0;
            resize: horizontal;
            /* ← 幅調整可能 */
        }

        #tree-header {
            padding: 10px 14px;
            font-size: 11px;
            font-weight: 700;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.06em;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            justify-content: space-between;
            flex-shrink: 0;
        }

        .tree-add-root-btn {
            background: none;
            border: 1px solid #cbd5e0;
            border-radius: 4px;
            cursor: pointer;
            font-size: 11px;
            color: #4a5568;
            padding: 2px 7px;
            transition: 0.15s;
        }

        .tree-add-root-btn:hover {
            background: #f0f4f8;
            border-color: #0056b3;
            color: #0056b3;
        }

        #tree-scroll {
            flex: 1;
            overflow-y: auto;
            padding: 6px 0;
        }

        #tree-empty-msg {
            padding: 20px 16px;
            font-size: 13px;
            color: #a0aec0;
            text-align: center;
            line-height: 1.6;
        }

        /* Tree Nodes */
        .tn {
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 6px 10px 6px 0;
            cursor: pointer;
            border-radius: 5px;
            margin: 1px 6px;
            transition: background 0.1s;
            user-select: none;
            min-height: 32px;
        }

        .tn:hover {
            background: #f7fafc;
        }

        .tn.selected {
            background: #ebf8ff;
            color: #2b6cb0;
        }

        .tn.selected .tn-label {
            font-weight: 600;
        }

        .tn-indent {
            flex-shrink: 0;
        }

        .tn-toggle {
            width: 16px;
            height: 16px;
            flex-shrink: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 9px;
            color: #a0aec0;
            border-radius: 3px;
        }

        .tn-toggle:hover {
            background: #e2e8f0;
            color: #4a5568;
        }

        .tn-toggle-placeholder {
            width: 16px;
            flex-shrink: 0;
        }

        .tn-icon {
            font-size: 15px;
            flex-shrink: 0;
        }

        .tn-label {
            flex: 1;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            font-size: 13px;
        }

        .tn-count {
            font-size: 11px;
            color: #a0aec0;
            background: #f7fafc;
            padding: 1px 6px;
            border-radius: 10px;
            flex-shrink: 0;
        }

        .tn.selected .tn-count {
            background: #bee3f8;
            color: #2b6cb0;
        }

        /* ── Content Panel ──────────────────────────────────────── */
        #content-panel {
            flex: 1;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            min-width: 0;
        }

        #content-header {
            background: white;
            padding: 10px 18px;
            border-bottom: 1px solid #e2e8f0;
            display: flex;
            align-items: center;
            gap: 10px;
            flex-shrink: 0;
        }

        #breadcrumb {
            flex: 1;
            font-size: 13px;
            color: #4a5568;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
        }

        .bc-item {
            cursor: pointer;
            color: #0056b3;
            transition: 0.1s;
        }

        .bc-item:hover {
            text-decoration: underline;
        }

        .bc-sep {
            color: #cbd5e0;
            margin: 0 4px;
        }

        .bc-current {
            color: #2d3748;
            font-weight: 600;
        }

        #content-actions {
            display: flex;
            gap: 6px;
            flex-shrink: 0;
        }

        .ca-btn {
            padding: 5px 12px;
            border: 1px solid #cbd5e0;
            background: white;
            border-radius: 6px;
            cursor: pointer;
            font-size: 12px;
            font-weight: 600;
            color: #4a5568;
            transition: 0.15s;
            white-space: nowrap;
        }

        .ca-btn:hover {
            background: #f0f4f8;
            border-color: #0056b3;
            color: #0056b3;
        }

        .ca-btn:disabled {
            opacity: 0.4;
            cursor: not-allowed;
        }

        #content-list {
            flex: 1;
            overflow-y: auto;
            padding: 12px 16px;
            display: flex;
            flex-direction: column;
            gap: 5px;
        }

        #content-empty {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100%;
            color: #a0aec0;
            font-size: 14px;
            text-align: center;
            gap: 10px;
            line-height: 1.6;
        }

        #content-empty .big-icon {
            font-size: 48px;
        }

        /* Content Items */
        .ci {
            background: white;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            padding: 9px 12px;
            display: flex;
            align-items: center;
            gap: 10px;
            transition: box-shadow 0.15s, border-color 0.15s;
        }

        .ci:hover {
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.07);
            border-color: #cbd5e0;
        }

        .ci-icon {
            font-size: 18px;
            flex-shrink: 0;
            line-height: 1;
        }

        .ci-info {
            flex: 1;
            overflow: hidden;
            min-width: 0;
        }

        .ci-title {
            font-size: 13px;
            font-weight: 500;
            color: #2d3748;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            cursor: pointer;
            line-height: 1.4;
        }

        .ci-title:hover {
            color: #0056b3;
        }

        .ci-url {
            font-size: 11px;
            color: #a0aec0;
            overflow: hidden;
            text-overflow: ellipsis;
            white-space: nowrap;
            margin-top: 2px;
            cursor: pointer;
        }

        .ci-url:hover {
            color: #0056b3;
        }

        .ci-meta {
            font-size: 11px;
            color: #a0aec0;
            margin-top: 2px;
        }

        .ci-actions {
            display: flex;
            gap: 3px;
            flex-shrink: 0;
            opacity: 0;
            transition: opacity 0.15s;
        }

        .ci:hover .ci-actions {
            opacity: 1;
        }

        .ia-btn {
            width: 28px;
            height: 28px;
            border: none;
            background: #f7fafc;
            border-radius: 5px;
            cursor: pointer;
            font-size: 13px;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: background 0.15s;
            color: #4a5568;
        }

        .ia-btn:hover {
            background: #e2e8f0;
        }

        .ia-btn:disabled {
            opacity: 0.3;
            cursor: default;
            background: none;
        }

        .ia-del:hover {
            background: #fed7d7;
            color: #c53030;
        }

        .ia-open:hover {
            background: #ebf8ff;
            color: #2b6cb0;
        }

        /* Inline Editing */
        .ci-edit-input {
            width: 100%;
            border: 1px solid #0056b3;
            border-radius: 4px;
            padding: 3px 6px;
            font-size: 13px;
            outline: none;
            background: #ebf8ff;
            color: #2d3748;
            font-family: inherit;
        }

        .ci-edit-input.url-input {
            font-size: 11px;
            color: #4a5568;
            margin-top: 2px;
        }

        /* ── Status Bar ─────────────────────────────────────────── */
        #statusbar {
            background: white;
            border-top: 1px solid #e2e8f0;
            padding: 6px 18px;
            font-size: 12px;
            color: #718096;
            display: flex;
            align-items: center;
            gap: 12px;
            flex-shrink: 0;
            height: 30px;
        }

        #statusbar .sb-main {
            flex: 1;
        }

        #statusbar .sb-counts {
            color: #a0aec0;
            font-size: 11px;
        }

        /* ── Modal ──────────────────────────────────────────────── */
        #modal-overlay {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.45);
            z-index: 100;
            align-items: center;
            justify-content: center;
        }

        #modal-overlay.show {
            display: flex;
        }

        #modal-box {
            background: white;
            border-radius: 12px;
            padding: 28px 28px 22px;
            width: 480px;
            max-width: 95vw;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.18);
            animation: modal-in 0.15s ease;
        }

        @keyframes modal-in {
            from {
                transform: translateY(-16px) scale(0.97);
                opacity: 0;
            }

            to {
                transform: none;
                opacity: 1;
            }
        }

        #modal-box h3 {
            font-size: 16px;
            font-weight: 700;
            color: #1e3a5f;
            margin-bottom: 18px;
        }

        .modal-field {
            margin-bottom: 14px;
        }

        .modal-field label {
            display: block;
            font-size: 12px;
            font-weight: 700;
            color: #718096;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 5px;
        }

        .modal-field input {
            width: 100%;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            padding: 9px 12px;
            font-size: 14px;
            outline: none;
            transition: border-color 0.15s;
            font-family: inherit;
        }

        .modal-field input:focus {
            border-color: #0056b3;
            box-shadow: 0 0 0 3px rgba(0, 86, 179, 0.1);
        }

        .modal-actions {
            display: flex;
            gap: 8px;
            justify-content: flex-end;
            margin-top: 20px;
        }

        .modal-actions button {
            padding: 9px 20px;
            border-radius: 6px;
            border: none;
            cursor: pointer;
            font-size: 14px;
            font-weight: 600;
            transition: 0.15s;
        }

        .modal-save {
            background: #0056b3;
            color: white;
        }

        .modal-save:hover {
            background: #004299;
        }

        .modal-cancel {
            background: #f0f4f8;
            color: #4a5568;
        }

        .modal-cancel:hover {
            background: #e2e8f0;
        }

        /* Search bar */
        #search-bar {
            padding: 8px 16px;
            border-bottom: 1px solid #f0f4f8;
            background: white;
            display: none;
        }

        #search-bar.show {
            display: block;
        }

        #search-input {
            width: 100%;
            border: 1px solid #cbd5e0;
            border-radius: 6px;
            padding: 6px 10px;
            font-size: 13px;
            outline: none;
        }

        #search-input:focus {
            border-color: #0056b3;
        }

        /* Scrollbar styling */
        ::-webkit-scrollbar {
            width: 5px;
            height: 5px;
        }

        ::-webkit-scrollbar-track {
            background: transparent;
        }

        ::-webkit-scrollbar-thumb {
            background: #cbd5e0;
            border-radius: 3px;
        }

        ::-webkit-scrollbar-thumb:hover {
            background: #a0aec0;
        }
    </style>
</head>

<body>

    <!-- Toolbar -->
    <div id="toolbar">
        <h1>✏️ Bookmark Editor</h1>
        <span class="stats" id="tb-stats">ファイル未読み込み</span>
        <div class="spacer"></div>
        <a href="merger.html"
            style="color:rgba(255,255,255,0.85);font-size:13px;font-weight:600;text-decoration:none;background:rgba(255,255,255,0.15);padding:6px 14px;border-radius:6px;margin-right:6px;transition:0.15s;white-space:nowrap;"
            onmouseover="this.style.background='rgba(255,255,255,0.25)'"
            onmouseout="this.style.background='rgba(255,255,255,0.15)'">← マージャーへ</a>
        <button class="tb-btn tb-import" id="btn-import">📂 Import</button>
        <button class="tb-btn tb-export" id="btn-export" disabled>💾 Export HTML</button>
        <input type="file" id="file-import-input" accept=".html,.htm">
    </div>

    <!-- Main Layout -->
    <div id="layout">

        <!-- Tree Panel -->
        <div id="tree-panel">
            <div id="tree-header">
                <span>📁 フォルダ</span>
                <button class="tree-add-root-btn" id="btn-add-root-folder" title="ルートにフォルダを追加">＋ フォルダ</button>
            </div>
            <div id="tree-scroll">
                <div id="tree-empty-msg">
                    ファイルをインポートして<br>ブックマークを読み込んでください
                </div>
            </div>
        </div>

        <!-- Content Panel -->
        <div id="content-panel">
            <div id="content-header">
                <div id="breadcrumb">
                    <span class="bc-item" onclick="selectFolder(null)">🏠 Root</span>
                </div>
                <div id="content-actions">
                    <button class="ca-btn" id="btn-search" title="検索">🔍</button>
                    <button class="ca-btn" id="btn-add-link" disabled>＋ リンク</button>
                    <button class="ca-btn" id="btn-add-folder" disabled>＋ フォルダ</button>
                </div>
            </div>

            <div id="search-bar">
                <input type="text" id="search-input" placeholder="タイトル・URLで検索...">
            </div>

            <div id="content-list">
                <div id="content-empty">
                    <span class="big-icon">📚</span>
                    <span>ファイルをインポートして開始<br><small style="color:#cbd5e0;">対応形式: Netscape Bookmark HTML</small></span>
                </div>
            </div>
        </div>
    </div>

    <!-- Status Bar -->
    <div id="statusbar">
        <span class="sb-main" id="sb-msg">準備完了</span>
        <span class="sb-counts" id="sb-counts"></span>
    </div>

    <!-- Edit Modal -->
    <div id="modal-overlay">
        <div id="modal-box">
            <h3 id="modal-title">編集</h3>
            <div class="modal-field">
                <label>タイトル</label>
                <input type="text" id="modal-name" placeholder="タイトルを入力">
            </div>
            <div class="modal-field" id="modal-url-field">
                <label>URL</label>
                <input type="url" id="modal-url" placeholder="https://...">
            </div>
            <div class="modal-actions">
                <button class="modal-cancel" id="modal-cancel">キャンセル</button>
                <button class="modal-save" id="modal-save">💾 保存</button>
            </div>
        </div>
    </div>

    <script>
        // ═══════════════════════════════════════════════════════════════
        //  State
        // ═══════════════════════════════════════════════════════════════
        let tree = [];       // Root-level nodes
        let folderPath = [];       // [{id, title}] breadcrumb
        let expandedIds = new Set();
        let idCounter = 0;
        let editingId = null;     // Modal editing target
        let searchQuery = '';

        const currentFolder = () => {
            if (folderPath.length === 0) return null;
            return findNode(folderPath[folderPath.length - 1].id);
        };

        const currentItems = () => {
            const f = currentFolder();
            return f ? f.children : tree;
        };

        // ─── Utilities ──────────────────────────────────────────────
        function genId() { return 'bm_' + (++idCounter); }
        function esc(s) { return s ? s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;') : ''; }
        function setStatus(msg) { document.getElementById('sb-msg').textContent = msg; }

        function findNode(id, nodes = tree) {
            for (const n of nodes) {
                if (n.id === id) return n;
                if (n.children) { const r = findNode(id, n.children); if (r) return r; }
            }
            return null;
        }

        function findParentArray(id, nodes = tree) {
            for (const n of nodes) {
                if (n.id === id) return nodes;
                if (n.children) { const r = findParentArray(id, n.children); if (r) return r; }
            }
            return null;
        }

        function countLinks(node) {
            if (node.type === 'link') return 1;
            return (node.children || []).reduce((s, c) => s + countLinks(c), 0);
        }

        function countAll(nodes = tree) {
            let links = 0, folders = 0;
            const walk = (arr) => arr.forEach(n => {
                if (n.type === 'link') links++;
                else { folders++; walk(n.children || []); }
            });
            walk(nodes);
            return { links, folders };
        }

        function updateToolbarStats() {
            const { links, folders } = countAll();
            document.getElementById('tb-stats').textContent = `${links.toLocaleString()} リンク · ${folders} フォルダ`;
            document.getElementById('sb-counts').textContent = `合計: ${links.toLocaleString()} リンク / ${folders} フォルダ`;
        }

        // ─── Parse Netscape Bookmark HTML ───────────────────────────
        function parseBookmarkHTML(html) {
            idCounter = 0;
            const doc = new DOMParser().parseFromString(html, 'text/html');

            function processDL(dl) {
                if (!dl) return [];
                const result = [];
                for (const el of Array.from(dl.children)) {
                    if (el.tagName !== 'DT' && el.tagName !== 'DD') continue;
                    const a = el.querySelector(':scope > a, :scope > A');
                    const h3 = el.querySelector(':scope > h3, :scope > H3');
                    const sub = el.querySelector(':scope > dl, :scope > DL');
                    if (a) {
                        result.push({
                            id: genId(),
                            type: 'link',
                            title: a.textContent.trim() || a.getAttribute('href') || 'Untitled',
                            url: a.getAttribute('href') || '',
                            addDate: parseInt(a.getAttribute('add_date') || a.getAttribute('ADD_DATE')) || Math.floor(Date.now() / 1000)
                        });
                    } else if (h3) {
                        result.push({
                            id: genId(),
                            type: 'folder',
                            title: h3.textContent.trim() || 'Folder',
                            addDate: parseInt(h3.getAttribute('add_date') || h3.getAttribute('ADD_DATE')) || Math.floor(Date.now() / 1000),
                            children: processDL(sub)
                        });
                    }
                }
                return result;
            }

            const rootDL = doc.querySelector('dl, DL');
            return rootDL ? processDL(rootDL) : [];
        }

        // ─── Serialize to Netscape HTML ──────────────────────────────
        function serializeHTML() {
            function nodesToHTML(nodes, depth) {
                const ind = '    '.repeat(depth);
                let s = `${ind}<DL><p>\n`;
                for (const n of nodes) {
                    if (n.type === 'link') {
                        s += `${ind}    <DT><A HREF="${esc(n.url)}" ADD_DATE="${n.addDate}">${esc(n.title)}</A>\n`;
                    } else {
                        s += `${ind}    <DT><H3 ADD_DATE="${n.addDate}">${esc(n.title)}</H3>\n`;
                        s += nodesToHTML(n.children || [], depth + 1);
                    }
                }
                s += `${ind}</DL><p>\n`;
                return s;
            }
            return `<!DOCTYPE NETSCAPE-Bookmark-file-1>
<!-- This is an automatically generated file.
     It will be read and overwritten.
     DO NOT EDIT! -->
<META HTTP-EQUIV="Content-Type" CONTENT="text/html; charset=UTF-8">
<TITLE>Bookmarks</TITLE>
<H1>Bookmarks</H1>
${nodesToHTML(tree, 0)}`;
        }

        // ═══════════════════════════════════════════════════════════════
        //  Rendering
        // ═══════════════════════════════════════════════════════════════

        function renderTree() {
            const scroll = document.getElementById('tree-scroll');
            const hasFolders = tree.some(n => n.type === 'folder');

            if (!hasFolders && tree.length === 0) {
                scroll.innerHTML = '<div id="tree-empty-msg">ファイルをインポートして<br>ブックマークを読み込んでください</div>';
                return;
            }
            if (!hasFolders) {
                scroll.innerHTML = '<div id="tree-empty-msg" style="color:#0056b3;">このファイルにはフォルダがありません。<br>右側でリンクを管理できます。</div>';
                return;
            }

            const selId = folderPath.length > 0 ? folderPath[folderPath.length - 1].id : null;

            function renderNode(node, depth) {
                if (node.type !== 'folder') return '';
                const isSelected = node.id === selId;
                const isExpanded = expandedIds.has(node.id);
                const subFolders = (node.children || []).filter(c => c.type === 'folder');
                const linkCount = countLinks(node);
                const indentPx = depth * 16;

                let html = `<div class="tn${isSelected ? ' selected' : ''}" data-id="${node.id}" onclick="handleTreeClick('${node.id}')">`;
                html += `<span class="tn-indent" style="width:${indentPx}px;flex-shrink:0;"></span>`;
                if (subFolders.length > 0) {
                    html += `<span class="tn-toggle" onclick="event.stopPropagation();toggleExpand('${node.id}')">${isExpanded ? '▼' : '▶'}</span>`;
                } else {
                    html += `<span class="tn-toggle-placeholder"></span>`;
                }
                html += `<span class="tn-icon">📁</span>`;
                html += `<span class="tn-label" title="${esc(node.title)}">${esc(node.title)}</span>`;
                html += `<span class="tn-count">${linkCount}</span>`;
                html += `</div>`;

                if (isExpanded && subFolders.length > 0) {
                    for (const child of subFolders) {
                        html += renderNode(child, depth + 1);
                    }
                }
                return html;
            }

            scroll.innerHTML = tree.filter(n => n.type === 'folder').map(n => renderNode(n, 0)).join('');
        }

        function renderBreadcrumb() {
            const bc = document.getElementById('breadcrumb');
            let html = `<span class="bc-item" onclick="selectFolder(null)">🏠 Root</span>`;
            folderPath.forEach((seg, i) => {
                html += `<span class="bc-sep">›</span>`;
                if (i === folderPath.length - 1) {
                    html += `<span class="bc-current">📁 ${esc(seg.title)}</span>`;
                } else {
                    html += `<span class="bc-item" onclick="selectFolderByPath(${i})">📁 ${esc(seg.title)}</span>`;
                }
            });
            bc.innerHTML = html;
        }

        function renderContent() {
            const list = document.getElementById('content-list');
            const addLink = document.getElementById('btn-add-link');
            const addFold = document.getElementById('btn-add-folder');
            const items = currentItems();

            addLink.disabled = false;
            addFold.disabled = false;

            // Apply search filter
            let displayItems = items;
            if (searchQuery) {
                const q = searchQuery.toLowerCase();
                displayItems = items.filter(item =>
                    item.title.toLowerCase().includes(q) ||
                    (item.url && item.url.toLowerCase().includes(q))
                );
            }

            if (displayItems.length === 0) {
                list.innerHTML = `<div id="content-empty">
      <span class="big-icon">${searchQuery ? '🔍' : '📭'}</span>
      <span>${searchQuery ? `「${esc(searchQuery)}」の結果なし` : 'このフォルダは空です<br><small style="color:#cbd5e0;">上のボタンからリンク・フォルダを追加できます</small>'}</span>
    </div>`;
                return;
            }

            list.innerHTML = displayItems.map((item, idx) => {
                const isFirst = idx === 0;
                const isLast = idx === displayItems.length - 1;

                if (item.type === 'link') {
                    return `
<div class="ci" data-id="${item.id}">
  <span class="ci-icon">🔗</span>
  <div class="ci-info">
    <div class="ci-title" title="${esc(item.title)}" onclick="startEditInline('${item.id}','title')">${esc(item.title)}</div>
    <div class="ci-url"   title="${esc(item.url)}"   onclick="startEditInline('${item.id}','url')">${esc(item.url)}</div>
  </div>
  <div class="ci-actions">
    <button class="ia-btn" title="編集"  onclick="openModal('${item.id}')">✏️</button>
    <button class="ia-btn" title="URLを開く" onclick="window.open('${esc(item.url)}','_blank')" ${!item.url ? 'disabled' : ''}>🔗</button>
    <button class="ia-btn" title="上へ"  onclick="moveItem('${item.id}',-1)" ${isFirst ? 'disabled' : ''}>↑</button>
    <button class="ia-btn" title="下へ"  onclick="moveItem('${item.id}',1)"  ${isLast ? 'disabled' : ''}>↓</button>
    <button class="ia-btn ia-del" title="削除" onclick="deleteItem('${item.id}')">🗑️</button>
  </div>
</div>`;
                } else {
                    const lc = countLinks(item);
                    const fc = (item.children || []).filter(c => c.type === 'folder').length;
                    return `
<div class="ci" data-id="${item.id}" style="border-left:3px solid #e2e8f0;">
  <span class="ci-icon">📁</span>
  <div class="ci-info">
    <div class="ci-title" title="${esc(item.title)}" onclick="startEditInline('${item.id}','title')">${esc(item.title)}</div>
    <div class="ci-meta">${lc} リンク · ${fc} サブフォルダ</div>
  </div>
  <div class="ci-actions">
    <button class="ia-btn ia-open" title="開く"  onclick="openSubFolder('${item.id}')">📂 開く</button>
    <button class="ia-btn" title="編集"  onclick="openModal('${item.id}')">✏️</button>
    <button class="ia-btn" title="上へ"  onclick="moveItem('${item.id}',-1)" ${isFirst ? 'disabled' : ''}>↑</button>
    <button class="ia-btn" title="下へ"  onclick="moveItem('${item.id}',1)"  ${isLast ? 'disabled' : ''}>↓</button>
    <button class="ia-btn ia-del" title="削除" onclick="deleteItem('${item.id}')">🗑️</button>
  </div>
</div>`;
                }
            }).join('');
        }

        function renderAll() {
            renderTree();
            renderBreadcrumb();
            renderContent();
            updateToolbarStats();
            document.getElementById('btn-export').disabled = tree.length === 0;
        }

        // ═══════════════════════════════════════════════════════════════
        //  Navigation
        // ═══════════════════════════════════════════════════════════════

        function handleTreeClick(id) {
            const node = findNode(id);
            if (!node) return;

            // Build path from root
            function buildPath(targetId, nodes = tree, path = []) {
                for (const n of nodes) {
                    if (n.type !== 'folder') continue;
                    const newPath = [...path, { id: n.id, title: n.title }];
                    if (n.id === targetId) return newPath;
                    if (n.children) {
                        const r = buildPath(targetId, n.children, newPath);
                        if (r) return r;
                    }
                }
                return null;
            }

            folderPath = buildPath(id) || [];
            expandedIds.add(id);
            searchQuery = '';
            document.getElementById('search-input').value = '';
            renderAll();
        }

        function selectFolder(id) {
            if (id === null) {
                folderPath = [];
            } else {
                handleTreeClick(id);
                return;
            }
            searchQuery = '';
            document.getElementById('search-input').value = '';
            renderAll();
        }

        function selectFolderByPath(idx) {
            folderPath = folderPath.slice(0, idx + 1);
            searchQuery = '';
            renderAll();
        }

        function openSubFolder(id) {
            const node = findNode(id);
            if (!node || node.type !== 'folder') return;
            folderPath = [...folderPath, { id: node.id, title: node.title }];
            expandedIds.add(id);
            searchQuery = '';
            renderAll();
        }

        function toggleExpand(id) {
            if (expandedIds.has(id)) expandedIds.delete(id);
            else expandedIds.add(id);
            renderTree();
        }

        // ═══════════════════════════════════════════════════════════════
        //  CRUD Operations
        // ═══════════════════════════════════════════════════════════════

        function addLink() {
            const items = currentItems();
            const node = {
                id: genId(),
                type: 'link',
                title: '新しいリンク',
                url: '',
                addDate: Math.floor(Date.now() / 1000)
            };
            items.push(node);
            renderAll();
            setStatus('✅ リンクを追加しました');
            // Auto-open edit modal
            setTimeout(() => openModal(node.id), 50);
        }

        function addFolder() {
            const items = currentItems();
            const node = {
                id: genId(),
                type: 'folder',
                title: '新しいフォルダ',
                addDate: Math.floor(Date.now() / 1000),
                children: []
            };
            items.push(node);
            renderAll();
            setStatus('✅ フォルダを追加しました');
            setTimeout(() => openModal(node.id), 50);
        }

        function addRootFolder() {
            const node = {
                id: genId(),
                type: 'folder',
                title: '新しいフォルダ',
                addDate: Math.floor(Date.now() / 1000),
                children: []
            };
            tree.push(node);
            expandedIds.add(node.id);
            renderAll();
            setStatus('✅ ルートフォルダを追加しました');
            setTimeout(() => openModal(node.id), 50);
        }

        function deleteItem(id) {
            const node = findNode(id);
            if (!node) return;

            const childCount = node.type === 'folder' ? countLinks(node) : 0;
            const confirmMsg = node.type === 'folder' && childCount > 0
                ? `「${node.title}」フォルダと中の ${childCount} 件のリンクを削除しますか？`
                : `「${node.title}」を削除しますか？`;

            if (!confirm(confirmMsg)) return;

            const arr = findParentArray(id);
            if (arr) {
                const idx = arr.findIndex(n => n.id === id);
                if (idx !== -1) arr.splice(idx, 1);
            }

            // If we deleted the currently shown folder, go up
            if (folderPath.some(seg => seg.id === id)) {
                folderPath = folderPath.slice(0, folderPath.findIndex(s => s.id === id));
            }

            renderAll();
            setStatus(`🗑️ 「${node.title}」を削除しました`);
        }

        function moveItem(id, dir) {
            const arr = findParentArray(id);
            if (!arr) return;
            const idx = arr.findIndex(n => n.id === id);
            const newIdx = idx + dir;
            if (newIdx < 0 || newIdx >= arr.length) return;
            [arr[idx], arr[newIdx]] = [arr[newIdx], arr[idx]];
            renderContent();
            setStatus('✅ 移動しました');
        }

        // ─── Inline Edit (click on title/url in list) ───────────────
        function startEditInline(id, field) {
            const node = findNode(id);
            if (!node) return;

            const ci = document.querySelector(`.ci[data-id="${id}"]`);
            if (!ci) return;

            if (field === 'title') {
                const titleEl = ci.querySelector('.ci-title');
                if (!titleEl) return;
                const inp = document.createElement('input');
                inp.className = 'ci-edit-input';
                inp.value = node.title;
                inp.title = 'Enterで確定 / Escでキャンセル';
                titleEl.replaceWith(inp);
                inp.focus(); inp.select();

                const save = () => {
                    node.title = inp.value.trim() || node.title;
                    // Update breadcrumb if it's the current folder
                    if (folderPath.some(s => s.id === id)) {
                        const seg = folderPath.find(s => s.id === id);
                        if (seg) seg.title = node.title;
                    }
                    renderAll(); setStatus('✅ タイトルを更新しました');
                };
                inp.addEventListener('keydown', e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') renderContent(); });
                inp.addEventListener('blur', save);

            } else if (field === 'url' && node.type === 'link') {
                const urlEl = ci.querySelector('.ci-url');
                if (!urlEl) return;
                const inp = document.createElement('input');
                inp.className = 'ci-edit-input url-input';
                inp.type = 'url'; inp.value = node.url;
                inp.title = 'Enterで確定 / Escでキャンセル';
                urlEl.replaceWith(inp);
                inp.focus(); inp.select();

                const save = () => {
                    node.url = inp.value.trim();
                    renderContent(); setStatus('✅ URLを更新しました');
                };
                inp.addEventListener('keydown', e => { if (e.key === 'Enter') save(); if (e.key === 'Escape') renderContent(); });
                inp.addEventListener('blur', save);
            }
        }

        // ─── Modal Edit ──────────────────────────────────────────────
        function openModal(id) {
            const node = findNode(id);
            if (!node) return;
            editingId = id;

            document.getElementById('modal-title').textContent = node.type === 'link' ? '🔗 リンクを編集' : '📁 フォルダを編集';
            document.getElementById('modal-name').value = node.title;
            document.getElementById('modal-url-field').style.display = node.type === 'link' ? 'block' : 'none';
            if (node.type === 'link') document.getElementById('modal-url').value = node.url || '';

            document.getElementById('modal-overlay').classList.add('show');
            document.getElementById('modal-name').focus();
            document.getElementById('modal-name').select();
        }

        function saveModal() {
            if (!editingId) return;
            const node = findNode(editingId);
            if (!node) return;

            const newTitle = document.getElementById('modal-name').value.trim();
            if (newTitle) node.title = newTitle;
            if (node.type === 'link') node.url = document.getElementById('modal-url').value.trim();

            // Update breadcrumb if it's a folder in path
            if (node.type === 'folder' && folderPath.some(s => s.id === editingId)) {
                const seg = folderPath.find(s => s.id === editingId);
                if (seg) seg.title = node.title;
            }

            closeModal();
            renderAll();
            setStatus('✅ 変更を保存しました');
        }

        function closeModal() {
            editingId = null;
            document.getElementById('modal-overlay').classList.remove('show');
        }

        // ═══════════════════════════════════════════════════════════════
        //  Import / Export
        // ═══════════════════════════════════════════════════════════════

        function importFile(file) {
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (e) => {
                try {
                    tree = parseBookmarkHTML(e.target.result);
                    folderPath = [];
                    expandedIds.clear();
                    searchQuery = '';
                    // Auto-expand top level
                    tree.filter(n => n.type === 'folder').forEach(n => expandedIds.add(n.id));
                    renderAll();
                    setStatus(`✅ 「${file.name}」を読み込みました`);
                } catch (err) {
                    setStatus(`❌ 読み込みエラー: ${err.message}`);
                }
            };
            reader.readAsText(file);
        }

        function exportFile() {
            const html = serializeHTML();
            const a = document.createElement('a');
            a.href = URL.createObjectURL(new Blob([html], { type: 'text/html' }));
            a.download = `bookmarks_edited_${new Date().toISOString().slice(0, 10)}.html`;
            document.body.appendChild(a);
            a.click();
            document.body.removeChild(a);
            URL.revokeObjectURL(a.href);
            setStatus('💾 エクスポートしました');
        }

        // ═══════════════════════════════════════════════════════════════
        //  Event Listeners
        // ═══════════════════════════════════════════════════════════════

        document.getElementById('btn-import').addEventListener('click', () => {
            document.getElementById('file-import-input').click();
        });
        document.getElementById('file-import-input').addEventListener('change', e => {
            importFile(e.target.files[0]);
        });
        document.getElementById('btn-export').addEventListener('click', exportFile);

        document.getElementById('btn-add-link').addEventListener('click', addLink);
        document.getElementById('btn-add-folder').addEventListener('click', addFolder);
        document.getElementById('btn-add-root-folder').addEventListener('click', addRootFolder);

        document.getElementById('modal-save').addEventListener('click', saveModal);
        document.getElementById('modal-cancel').addEventListener('click', closeModal);
        document.getElementById('modal-overlay').addEventListener('click', (e) => {
            if (e.target === document.getElementById('modal-overlay')) closeModal();
        });

        // Modal keyboard shortcuts
        document.addEventListener('keydown', (e) => {
            if (document.getElementById('modal-overlay').classList.contains('show')) {
                if (e.key === 'Escape') closeModal();
                if (e.key === 'Enter' && e.target.tagName === 'INPUT') saveModal();
            }
        });

        // Modal Enter key in name field
        document.getElementById('modal-name').addEventListener('keydown', e => {
            if (e.key === 'Enter') saveModal();
        });
        document.getElementById('modal-url').addEventListener('keydown', e => {
            if (e.key === 'Enter') saveModal();
        });

        // Search
        document.getElementById('btn-search').addEventListener('click', () => {
            const bar = document.getElementById('search-bar');
            bar.classList.toggle('show');
            if (bar.classList.contains('show')) document.getElementById('search-input').focus();
            else { searchQuery = ''; document.getElementById('search-input').value = ''; renderContent(); }
        });

        document.getElementById('search-input').addEventListener('input', e => {
            searchQuery = e.target.value;
            renderContent();
        });

        // Drag & Drop on the whole page for import
        document.addEventListener('dragover', e => e.preventDefault());
        document.addEventListener('drop', (e) => {
            e.preventDefault();
            const file = e.dataTransfer.files[0];
            if (file && (file.name.endsWith('.html') || file.name.endsWith('.htm'))) {
                importFile(file);
            }
        });

        // Initial render
        renderAll();
    </script>
</body>

</html>
